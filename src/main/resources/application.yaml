server:
  port: 8080

spring:
  application:
    name: teya-ledger

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

ledger:
  storage:
    type: yaml
    yaml:
      directory: ./data/streams
  idempotency:
    cache-size: 10000
    ttl: PT24H
