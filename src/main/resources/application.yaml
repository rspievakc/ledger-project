server:
  port: 8080

spring:
  application:
    name: teya-ledger

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

ledger:
  storage:
    # in-memory: zero-config default, events live for the JVM lifetime.
    # yaml: persist per-account event streams to disk under `directory`.
    type: in-memory
    yaml:
      directory: ./data/streams
  idempotency:
    cache-size: 10000
    ttl: PT24H
